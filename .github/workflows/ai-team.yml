name: LinkedIn Strategy AI Team
on: [push]

jobs:
  ai-robot-work:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install AI Switchboard
        run: gh extension install github/gh-models
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Ask the AI Team to help
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Engineering Logic (DeepSeek)
          gh models run deepseek/deepseek-r1 "Review technical feasibility of Zonal E/E decoupling in EVs." > engineering_logic.txt

          # 2. LinkedIn Draft (Grok 3)
          gh models run xai/grok-3 "Write a LinkedIn post with orange diamonds about AIDV superbrains." > linkedin_draft.txt

          # 3. Data Report (Llama 4)
          gh models run meta/llama-4-maverick-17b-128e-instruct-fp8 "Compare traditional vs Centralized E/E architectures." > tech_report.txt

      - name: Save My LinkedIn Reports
        uses: actions/upload-artifact@v4
        with:
          name: strategy-outputs
          path: |
            engineering_logic.txt
            linkedin_draft.txt
            tech_report.txt
