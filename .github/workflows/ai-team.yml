name: LinkedIn Strategy AI Team
on: [push]

jobs:
  ai-robot-work:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install AI Switchboard
        run: gh extension install github/gh-models
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Ask the AI Team to help
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1. Engineering Logic (DeepSeek)
          gh models run deepseek-ai/deepseek-r1 "Review the technical feasibility of Zonal E/E decoupling in AIDV for a senior engineer audience. Focus on safety and failsafes." > engineering_logic.txt

          # 2. LinkedIn Draft (Grok 3)
          gh models run xai/grok-3 "Write a LinkedIn post about AIDV 'Superbrains'. Use 🔸 bullets. Tone: Bold/Influencer. Context: Pune EV Hub." > linkedin_draft.txt

          # 3. Data Report (Llama 4)
          gh models run meta/llama-4-maverick-17b-128e-instruct-fp8 "Summarize the major differences between traditional E/E and AIDV Centralized architectures in a structured list." > tech_report.txt

      - name: Save My LinkedIn Reports
        uses: actions/upload-artifact@v4
        with:
          name: strategy-outputs
          path: |
            engineering_logic.txt
            linkedin_draft.txt
            tech_report.txt
