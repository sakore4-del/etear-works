name: LinkedIn Strategy AI Team
on: [push]

jobs:
  ai-robot-work:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read    # This is your "Security Badge" for DeepSeek & Grok
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install AI Switchboard
        run: gh extension install github/gh-models
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Ask the AI Team to help
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Engineering Logic (DeepSeek)
          gh models run deepseek-ai/deepseek-r1 "Review technical feasibility of Zonal E/E decoupling." > engineering_logic.txt

          # LinkedIn Draft (Grok 3)
          gh models run xai/grok-3 "Write a LinkedIn post with orange diamonds about AIDV." > linkedin_draft.txt

          # Data Report (Llama 4)
          gh models run meta/llama-4-maverick-17b-128e-instruct-fp8 "Summarize traditional vs Centralized E/E." > tech_report.txt

      - name: Save My LinkedIn Reports
        uses: actions/upload-artifact@v4
        with:
          name: strategy-outputs
          path: |
            engineering_logic.txt
            linkedin_draft.txt
            tech_report.txt
